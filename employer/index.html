<!DOCTYPE html>
<html lang="cs">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>makej. for business — analytika & nábor</title>
  <link rel="icon" type="image/png" href="/favicon.png" />

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=Inter:wght@400;500;600;700;800;900&family=JetBrains+Mono:wght@400;600;700&family=Playfair+Display:ital,wght@1,600;1,700&display=swap" rel="stylesheet">

  <script src="https://code.iconify.design/iconify-icon/2.1.0/iconify-icon.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>

  <script src="https://unpkg.com/react@18.3.1/umd/react.production.min.js" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.production.min.js" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" crossorigin="anonymous"></script>

  <style>
    :root { color-scheme: dark; }
    *, *::before, *::after { box-sizing: border-box; }
    html, body, #root { width: 100%; height: 100%; }
    html, body {
      margin: 0; padding: 0;
      background: #07071a;
      font-family: "Plus Jakarta Sans", -apple-system, system-ui, sans-serif;
      color: #fff;
      -webkit-font-smoothing: antialiased;
      overflow: hidden;
    }
    iconify-icon { display: inline-flex; line-height: 0; }
    @keyframes empSpin { to { transform: rotate(360deg); } }
    @keyframes empPop { 0% { transform: scale(0.92) translateY(12px); opacity: 0; } 100% { transform: scale(1) translateY(0); opacity: 1; } }

    /* Auth gate */
    #auth-gate {
      position: fixed; inset: 0;
      display: flex; align-items: center; justify-content: center;
      background: linear-gradient(180deg, #2a2ab5 0%, #050510 100%);
      z-index: 9999;
    }
    #auth-gate.hidden { display: none; }
    .gate-card {
      background: rgba(22,22,59,0.9);
      border: 1px solid rgba(208,208,255,0.12);
      border-radius: 1.5rem;
      padding: 2.5rem;
      width: min(420px, calc(100vw - 40px));
      text-align: center;
    }
    .gate-logo {
      font-family: Inter, sans-serif;
      font-size: 2.2rem; font-weight: 900;
      background: linear-gradient(135deg, #7c7cff, #d0d0ff);
      -webkit-background-clip: text; background-clip: text;
      -webkit-text-fill-color: transparent;
      margin-bottom: 0.25rem;
    }
    .gate-sub { color: #FFD166; font-size: 0.75rem; font-weight: 700; letter-spacing: 1.5px; text-transform: uppercase; margin-bottom: 1.75rem; }
    .gate-title { font-size: 1.4rem; font-weight: 800; margin-bottom: 0.5rem; color: #fff; }
    .gate-desc { color: #9999cc; font-size: 0.9rem; margin-bottom: 1.75rem; }
    .gate-error { background: rgba(244,63,94,0.12); border: 1px solid rgba(244,63,94,0.3); border-radius: 0.75rem; padding: 10px 14px; color: #f87171; font-size: 0.875rem; margin-bottom: 1rem; display: none; }
    .gate-input {
      width: 100%; padding: 11px 15px;
      background: rgba(255,255,255,0.04);
      border: 1px solid rgba(208,208,255,0.14);
      border-radius: 0.75rem;
      color: #fff; font-family: inherit; font-size: 0.95rem;
      outline: none; margin-bottom: 0.75rem;
      transition: border-color .2s;
    }
    .gate-input:focus { border-color: rgba(208,208,255,0.4); }
    .gate-input::placeholder { color: #6e6ea8; }
    .gate-btn {
      width: 100%; padding: 13px;
      background: linear-gradient(135deg, #292978, #3a3a99);
      border: none; border-radius: 0.75rem;
      color: #fff; font-family: inherit; font-size: 1rem; font-weight: 700;
      cursor: pointer; margin-bottom: 1rem; transition: opacity .2s;
    }
    .gate-btn:disabled { opacity: 0.6; cursor: not-allowed; }
    .gate-back { color: #9999cc; font-size: 0.85rem; cursor: pointer; background: none; border: none; font-family: inherit; }
    .gate-back:hover { color: #d0d0ff; }

    ::-webkit-scrollbar { width: 8px; height: 8px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: rgba(208,208,255,0.12); border-radius: 8px; }
    ::-webkit-scrollbar-thumb:hover { background: rgba(208,208,255,0.22); }

    button { font-family: inherit; }
    input { font-family: inherit; }
  </style>
</head>
<body>

  <!-- Auth gate — zobrazí se dokud není ověřen zaměstnavatel -->
  <div id="auth-gate">
    <div class="gate-card">
      <div class="gate-logo">makej!</div>
      <div class="gate-sub">for business</div>
      <div class="gate-title">Přihlásit se</div>
      <div class="gate-desc">Dashboard je dostupný pouze pro zaměstnavatele.</div>
      <div class="gate-error" id="gate-error"></div>
      <input class="gate-input" type="email" id="gate-email" placeholder="tvuj@email.cz" autocomplete="email" />
      <input class="gate-input" type="password" id="gate-password" placeholder="Heslo" autocomplete="current-password" />
      <button class="gate-btn" id="gate-submit">Přihlásit se</button>
      <button class="gate-back" onclick="window.location.href='../'">← Zpět na makej.cz</button>
    </div>
  </div>

  <div id="root"></div>

  <script>
    // ── Auth gate ──
    const SUPABASE_URL = 'https://cxegfwfbgcgpwerfbvra.supabase.co';
    const SUPABASE_ANON_KEY = 'sb_publishable_N_BIwMCTD6ZOTrtBl3juyw_CGIQ_lvh';
    const sb = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY, {
      auth: { persistSession: true, storageKey: 'makej-auth' }
    });

    const gate = document.getElementById('auth-gate');
    const gateError = document.getElementById('gate-error');
    const gateSubmit = document.getElementById('gate-submit');

    function showGate() { gate.classList.remove('hidden'); }
    function hideGate() { gate.classList.add('hidden'); }

    function showGateError(msg) {
      gateError.textContent = msg;
      gateError.style.display = 'block';
    }

    function translateGateError(msg) {
      if (msg.includes('Invalid login credentials'))  return 'Nesprávný email nebo heslo.';
      if (msg.includes('Email not confirmed'))         return 'Nejdřív potvrď svůj email.';
      if (msg.includes('missing'))                     return 'Zadejte email a heslo.';
      if (msg.includes('Password should be at least')) return 'Heslo musí mít alespoň 6 znaků.';
      if (msg.includes('rate limit'))                  return 'Příliš mnoho pokusů, zkus to za chvíli.';
      if (msg.includes('invalid') && msg.includes('email')) return 'Zadejte platný email.';
      return msg;
    }

    gateSubmit.addEventListener('click', async () => {
      gateError.style.display = 'none';
      const email = document.getElementById('gate-email').value.trim();
      const password = document.getElementById('gate-password').value;
      if (!email || !password) { showGateError('Vyplň email a heslo.'); return; }

      gateSubmit.disabled = true;
      gateSubmit.textContent = 'Přihlašuji...';

      const { data, error } = await sb.auth.signInWithPassword({ email, password });

      if (error) {
        showGateError(translateGateError(error.message));
        gateSubmit.disabled = false;
        gateSubmit.textContent = 'Přihlásit se';
        return;
      }

      const role = data.user?.user_metadata?.role;
      if (role !== 'employer') {
        await sb.auth.signOut();
        showGateError('Tento dashboard je pouze pro zaměstnavatele.');
        gateSubmit.disabled = false;
        gateSubmit.textContent = 'Přihlásit se';
        return;
      }

      hideGate();
    });

    // Enter key
    document.getElementById('gate-password').addEventListener('keydown', e => {
      if (e.key === 'Enter') gateSubmit.click();
    });

    // Check existing session on load
    sb.auth.getSession().then(({ data: { session } }) => {
      const role = session?.user?.user_metadata?.role;
      if (session && role === 'employer') {
        hideGate();
      } else {
        showGate();
      }
    });
  </script>

  <script type="text/babel" src="app.jsx?v=1"></script>
  <script type="text/babel" src="employer-data.jsx?v=1"></script>
  <script type="text/babel" src="employer-shell.jsx?v=1"></script>
  <script type="text/babel" src="employer-dashboard.jsx?v=1"></script>
  <script type="text/babel" src="employer-pages.jsx?v=1"></script>
  <script type="text/babel" src="employer-pages3.jsx?v=1"></script>
  <script type="text/babel" src="_premium/analytics.jsx?v=1"></script>
  <script type="text/babel" src="employer-supabase.jsx?v=1"></script>
  <script type="text/babel" src="employer-main.jsx?v=2"></script>
</body>
</html>
