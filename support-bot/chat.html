<!DOCTYPE html>
<html lang="cs">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Makej! — Podpora</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: system-ui, sans-serif; background: #0a0a1a; color: #fff; display: flex; align-items: center; justify-content: center; min-height: 100vh; }

  #chat-widget {
    position: fixed; bottom: 24px; right: 24px;
    display: flex; flex-direction: column; align-items: flex-end; gap: 12px;
    z-index: 9999;
  }

  #chat-box {
    width: 340px; height: 480px;
    background: #0e0e2a; border: 1.5px solid rgba(167,139,250,.25);
    border-radius: 20px; box-shadow: 0 20px 60px rgba(0,0,30,.7);
    display: flex; flex-direction: column; overflow: hidden;
    transform: translateY(20px); opacity: 0; pointer-events: none;
    transition: transform .28s cubic-bezier(.2,.8,.2,1), opacity .28s ease;
  }
  #chat-box.open { transform: translateY(0); opacity: 1; pointer-events: all; }

  #chat-header {
    background: linear-gradient(135deg, #2a2a6a, #1a1a3a);
    padding: 14px 16px; display: flex; align-items: center; gap: 10px;
    border-bottom: 1px solid rgba(255,255,255,.08);
  }
  .chat-avatar {
    width: 36px; height: 36px; border-radius: 50%;
    background: linear-gradient(160deg,#4848c4 0%,#1c1c7a 100%);
    position: relative; overflow: hidden; flex-shrink: 0;
  }
  .chat-avatar .eye {
    position: absolute; width: 10px; height: 10px;
    background: white; border-radius: 50%; overflow: hidden;
    display: flex; align-items: center; justify-content: center;
  }
  .chat-avatar .eye.left  { left: 5px; top: 14px; }
  .chat-avatar .eye.right { right: 5px; top: 14px; }
  .chat-avatar .pupil {
    width: 7px; height: 7px; background: #16163c;
    border-radius: 50%; transition: transform .09s ease;
    position: absolute;
  }
  .chat-avatar .mouth {
    position: absolute; bottom: 8px; left: 50%;
    transform: translateX(-50%);
    width: 12px; height: 5px;
    border-bottom: 2px solid rgba(255,255,255,.6);
    border-radius: 0 0 6px 6px;
  }
  .chat-avatar .blush {
    position: absolute; bottom: 10px;
    width: 5px; height: 3px;
    background: rgba(255,150,150,.4); border-radius: 50%;
  }
  .chat-avatar .blush.left  { left: 3px; }
  .chat-avatar .blush.right { right: 3px; }

  #chat-info { flex: 1; }
  #chat-name { font-weight: 700; font-size: .95rem; color: #e0e0ff; }
  #chat-status-row { display: flex; align-items: center; gap: 5px; margin-top: 2px; }
  #chat-dot { width: 7px; height: 7px; border-radius: 50%; transition: background .4s, box-shadow .4s; }
  #chat-dot.joining { background: #f97316; box-shadow: 0 0 6px rgba(249,115,22,.6); }
  #chat-dot.online  { background: #22c55e; box-shadow: 0 0 6px rgba(34,197,94,.5); }
  #chat-status { font-size: .75rem; transition: color .4s; }
  #chat-status.joining { color: #f97316; }
  #chat-status.online  { color: #22c55e; }
  #chat-close {
    background: none; border: none; color: rgba(255,255,255,.5);
    cursor: pointer; font-size: 1.2rem; padding: 4px; line-height: 1;
    transition: color .15s;
  }
  #chat-close:hover { color: #fff; }

  #chat-messages {
    flex: 1; overflow-y: auto; padding: 16px; display: flex;
    flex-direction: column; gap: 10px;
    scrollbar-width: thin; scrollbar-color: rgba(167,139,250,.2) transparent;
  }

  .msg { max-width: 80%; padding: 10px 14px; border-radius: 14px; font-size: .88rem; line-height: 1.45; word-break: break-word; }
  .msg.bot   { background: rgba(91,107,255,.18); color: #d0d0ff; border-bottom-left-radius: 4px; align-self: flex-start; }
  .msg.human { background: rgba(91,107,255,.18); color: #d0d0ff; border-bottom-left-radius: 4px; align-self: flex-start; }
  .msg.user  { background: linear-gradient(135deg,#4848c4,#292978); color: #fff; border-bottom-right-radius: 4px; align-self: flex-end; }

  .typing { display: flex; gap: 4px; padding: 12px 14px; align-self: flex-start; background: rgba(91,107,255,.18); border-radius: 14px; border-bottom-left-radius: 4px; }
  .typing span { width: 7px; height: 7px; background: #a78bfa; border-radius: 50%; animation: bounce 1.1s infinite; }
  .typing span:nth-child(2) { animation-delay: .18s; }
  .typing span:nth-child(3) { animation-delay: .36s; }
  @keyframes bounce { 0%,60%,100% { transform: translateY(0); opacity: .6; } 30% { transform: translateY(-6px); opacity: 1; } }

  #chat-input-row {
    padding: 12px; border-top: 1px solid rgba(255,255,255,.08);
    display: flex; gap: 8px;
  }
  #chat-input {
    flex: 1; background: rgba(255,255,255,.07); border: 1.5px solid rgba(167,139,250,.2);
    border-radius: 10px; padding: 10px 14px; color: #fff; font-size: .88rem;
    outline: none; transition: border-color .2s; font-family: inherit;
  }
  #chat-input:focus { border-color: rgba(167,139,250,.5); }
  #chat-input::placeholder { color: #5a5a8a; }
  #chat-send {
    background: linear-gradient(135deg,#4848c4,#292978);
    border: none; border-radius: 10px; width: 40px; height: 40px;
    color: #fff; cursor: pointer; display: flex; align-items: center;
    justify-content: center; transition: opacity .15s; flex-shrink: 0;
  }
  #chat-send:hover { opacity: .85; }

  #chat-toggle {
    width: 56px; height: 56px; border-radius: 50%;
    background: linear-gradient(135deg,#4848c4,#292978);
    border: none; cursor: pointer; color: #fff; font-size: 1.5rem;
    box-shadow: 0 8px 24px rgba(72,72,196,.5);
    display: flex; align-items: center; justify-content: center;
    transition: transform .2s, box-shadow .2s;
  }
  #chat-toggle:hover { transform: scale(1.08); box-shadow: 0 12px 32px rgba(72,72,196,.65); }

  .sender-label { font-size: .7rem; color: #7070a0; margin-bottom: 2px; }
</style>
</head>
<body>

<div id="chat-widget">
  <div id="chat-box">
    <div id="chat-header">
      <div class="chat-avatar" id="av">
        <div class="eye left"><div class="pupil" id="avPL"></div></div>
        <div class="eye right"><div class="pupil" id="avPR"></div></div>
        <div class="mouth"></div>
        <div class="blush left"></div>
        <div class="blush right"></div>
      </div>
      <div id="chat-info">
        <div id="chat-name">Makač</div>
        <div id="chat-status-row">
          <div id="chat-dot" class="joining"></div>
          <span id="chat-status" class="joining">Už letím...</span>
        </div>
      </div>
      <button id="chat-close">✕</button>
    </div>

    <div id="chat-messages"></div>

    <div id="chat-input-row">
      <input id="chat-input" type="text" placeholder="Napiš zprávu..." autocomplete="off" />
      <button id="chat-send">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/></svg>
      </button>
    </div>
  </div>

  <button id="chat-toggle">💬</button>
</div>

<script>
var API = 'http://localhost:8000';
var convId = 'web-' + Math.random().toString(36).slice(2, 10);
var welcomed = false;
var lastTs = '2000-01-01';
var pollInterval = null;
var isHumanActive = false;

var box     = document.getElementById('chat-box');
var toggle  = document.getElementById('chat-toggle');
var closeBtn= document.getElementById('chat-close');
var msgs    = document.getElementById('chat-messages');
var input   = document.getElementById('chat-input');
var sendBtn = document.getElementById('chat-send');
var dot     = document.getElementById('chat-dot');
var status  = document.getElementById('chat-status');
var avEyeL  = document.getElementById('av');
var avPL    = document.getElementById('avPL');
var avPR    = document.getElementById('avPR');

function setStatus(state) {
  dot.className    = 'joining' === state ? 'joining' : 'online';
  dot.className    = state;
  status.className = state;
  status.textContent = state === 'joining' ? 'Už letím...' : 'online';
}

function addMsg(text, role, label) {
  if (label) {
    var lbl = document.createElement('div');
    lbl.className = 'sender-label';
    lbl.textContent = label;
    msgs.appendChild(lbl);
  }
  var el = document.createElement('div');
  el.className = 'msg ' + role;
  el.innerHTML = text;
  msgs.appendChild(el);
  msgs.scrollTop = msgs.scrollHeight;
  return el;
}

function showTyping() {
  var el = document.createElement('div');
  el.className = 'typing';
  el.innerHTML = '<span></span><span></span><span></span>';
  msgs.appendChild(el);
  msgs.scrollTop = msgs.scrollHeight;
  return el;
}

function openChat() {
  box.classList.add('open');
  input.focus();
  if (!welcomed) {
    welcomed = true;
    setStatus('joining');
    var t = showTyping();
    setTimeout(function() {
      t.remove();
      addMsg('Ahoj! 👋 Jsem <strong>Makač</strong>, tvůj AI pomocník. Na co se mě chceš zeptat?', 'bot');
      setTimeout(function() { setStatus('online'); }, 400);
    }, 2000);
    startPolling();
  }
}

toggle.addEventListener('click', openChat);
closeBtn.addEventListener('click', function() { box.classList.remove('open'); });

function sendMessage() {
  var text = input.value.trim();
  if (!text) return;
  input.value = '';
  addMsg(text, 'user');

  fetch(API + '/chat/message', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ conversation_id: convId, text: text })
  })
  .then(function(r) { return r.json(); })
  .then(function(data) {
    if (data.reply === '__human_active__') return;
    if (data.escalated) isHumanActive = false;
    addMsg(data.reply, 'bot');
  })
  .catch(function() {
    addMsg('Chyba spojení. Zkus to znovu.', 'bot');
  });
}

sendBtn.addEventListener('click', sendMessage);
input.addEventListener('keydown', function(e) {
  if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMessage(); }
});

function startPolling() {
  if (pollInterval) return;
  pollInterval = setInterval(function() {
    fetch(API + '/chat/messages?conversation_id=' + convId + '&since=' + lastTs)
    .then(function(r) { return r.json(); })
    .then(function(messages) {
      messages.forEach(function(m) {
        if (m.sender === 'human') {
          addMsg(m.text, 'human', 'Podpora');
          lastTs = m.created_at;
        } else {
          lastTs = m.created_at;
        }
      });
    });
  }, 3000);
}

// Eye tracking
document.addEventListener('mousemove', function(e) {
  movePupil(avPL, document.querySelector('.eye.left'), e.clientX, e.clientY);
  movePupil(avPR, document.querySelector('.eye.right'), e.clientX, e.clientY);
});

function movePupil(pupil, eye, mx, my) {
  if (!eye) return;
  var r = eye.getBoundingClientRect();
  var cx = r.left + r.width / 2;
  var cy = r.top + r.height / 2;
  var dx = mx - cx, dy = my - cy;
  var dist = Math.sqrt(dx*dx + dy*dy);
  var max = 1.5;
  var x = dist > max ? (dx/dist)*max : dx;
  var y = dist > max ? (dy/dist)*max : dy;
  pupil.style.transform = 'translate(' + x + 'px,' + y + 'px)';
}
</script>
</body>
</html>
